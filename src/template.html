<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body id="layout">

<aside id="sidebar">

    <div id="sidebar-group-1">
        <p id="sidebar-title">To Do List</p>
    </div>

    <div id="sidebar-group-2" class="sidebar-group">
        <button id="new-task-sidebar-button" class="sidebar-button" aria-label="New task"><svg class="sidebar-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 12H20M12 4V20" stroke="#faf9f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>New Task</button>
        <button id="new-project-sidebar-button" class="sidebar-button" aria-label="New project"><svg class="sidebar-svg" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:sketch="http://www.bohemiancoding.com/sketch/ns" fill="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <desc>Created with Sketch Beta.</desc> <defs> </defs> <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd" sketch:type="MSPage"> <g id="Icon-Set" sketch:type="MSLayerGroup" transform="translate(-464.000000, -1087.000000)" fill="#faf9f5"> <path d="M480,1117 C472.268,1117 466,1110.73 466,1103 C466,1095.27 472.268,1089 480,1089 C487.732,1089 494,1095.27 494,1103 C494,1110.73 487.732,1117 480,1117 L480,1117 Z M480,1087 C471.163,1087 464,1094.16 464,1103 C464,1111.84 471.163,1119 480,1119 C488.837,1119 496,1111.84 496,1103 C496,1094.16 488.837,1087 480,1087 L480,1087 Z M486,1102 L481,1102 L481,1097 C481,1096.45 480.553,1096 480,1096 C479.447,1096 479,1096.45 479,1097 L479,1102 L474,1102 C473.447,1102 473,1102.45 473,1103 C473,1103.55 473.447,1104 474,1104 L479,1104 L479,1109 C479,1109.55 479.447,1110 480,1110 C480.553,1110 481,1109.55 481,1109 L481,1104 L486,1104 C486.553,1104 487,1103.55 487,1103 C487,1102.45 486.553,1102 486,1102 L486,1102 Z" id="plus-circle" sketch:type="MSShapeGroup"> </path> </g> </g> </g></svg>New Project</button>
    </div>

    <div id="sidebar-group-3" class="sidebar-group">
        <button id="view-tasks-sidebar-button" class="sidebar-button" aria-label="View tasks"><svg class="sidebar-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M8.707 6.707a1 1 0 0 0-1.414-1.414L4 8.586 2.707 7.293a1 1 0 0 0-1.414 1.414l2 2a1 1 0 0 0 1.414 0l4-4ZM12 7a1 1 0 1 0 0 2h10a1 1 0 1 0 0-2H12ZM8.707 13.293a1 1 0 0 1 0 1.414l-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 1 1 1.414-1.414L4 16.586l3.293-3.293a1 1 0 0 1 1.414 0ZM12 15a1 1 0 1 0 0 2h10a1 1 0 1 0 0-2H12Z" fill="#faf9f5"></path></g></svg>Tasks</button>
        <button id="view-projects-sidebar-button" class="sidebar-button" aria-label="View projects"><svg class="sidebar-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#faf9f5"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <defs> <style>.cls-1{fill:none;stroke:#faf9f5;stroke-linecap:square;stroke-miterlimit:10;stroke-width:1.91px;}</style> </defs> <g id="archieve"> <rect class="cls-1" x="1.5" y="1.98" width="21" height="6.68"></rect> <rect class="cls-1" x="1.5" y="8.66" width="21" height="6.68"></rect> <rect class="cls-1" x="1.5" y="15.34" width="21" height="6.68"></rect> <line class="cls-1" x1="10.09" y1="3.89" x2="13.91" y2="3.89"></line> <line class="cls-1" x1="10.09" y1="10.57" x2="13.91" y2="10.57"></line> <line class="cls-1" x1="10.09" y1="17.25" x2="13.91" y2="17.25"></line> </g> </g></svg>Projects</button>
    </div>

</aside>

<main id="main">

    <p id="main-title">Welcome to your personal to do list!</p>

    <p class="main-p">Try clicking the New Task button to get started!</p>

</main>

    <dialog id="new-task-dialog">
        <form id="new-task-dialog-form" method="dialog">

            <div class="form-title-group">
                <p class="form-title">New Task</p>
                <button id="new-task-dialog-cancel-button" class="dialog-cancel-button" type="button" aria-label="Close new task form"><svg class="dialog-cancel-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="#c2c0b6"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <title>Close new task form</title> <path d="M20.7457 3.32851C20.3552 2.93798 19.722 2.93798 19.3315 3.32851L12.0371 10.6229L4.74275 3.32851C4.35223 2.93798 3.71906 2.93798 3.32854 3.32851C2.93801 3.71903 2.93801 4.3522 3.32854 4.74272L10.6229 12.0371L3.32856 19.3314C2.93803 19.722 2.93803 20.3551 3.32856 20.7457C3.71908 21.1362 4.35225 21.1362 4.74277 20.7457L12.0371 13.4513L19.3315 20.7457C19.722 21.1362 20.3552 21.1362 20.7457 20.7457C21.1362 20.3551 21.1362 19.722 20.7457 19.3315L13.4513 12.0371L20.7457 4.74272C21.1362 4.3522 21.1362 3.71903 20.7457 3.32851Z" fill="#c2c0b6"></path> </g></svg></button>
            </div>
            

            <div class="form-group">
                <label for="task-title">Title</label>
                <input id="task-title" name="task_title" type="text" maxlength="40" required>
            </div>

            <div class="form-group">
                <label for="task-description">Description</label>
                <textarea name="task_description" id="task-description" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label for="task-due-date">Due Date</label>
                <input id="task-due-date" name="task_due_date" type="date" required>
            </div>

            <div class="form-group">
                <label for="task-priority">Priority</label>
                <select name="task_priority" id="task-priority" required>
                    <option value="" selected disabled>Select</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="task-project">Project</label>
                <select name="task_project" id="task-project"></select>
            </div>

            <button id="new-task-dialog-submit-button" class="dialog-submit-button" type="submit">Add Task</button>

        </form>
    </dialog>

    <dialog id="new-project-dialog">
        <form id="new-project-dialog-form" method="dialog">

            <div class="form-title-group">
                <p class="form-title">New Project</p>
                <button id="new-project-dialog-cancel-button" class="dialog-cancel-button" type="button" aria-label="Close new project form"><svg class="dialog-cancel-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke="#c2c0b6"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <title>Close new project form</title> <path d="M20.7457 3.32851C20.3552 2.93798 19.722 2.93798 19.3315 3.32851L12.0371 10.6229L4.74275 3.32851C4.35223 2.93798 3.71906 2.93798 3.32854 3.32851C2.93801 3.71903 2.93801 4.3522 3.32854 4.74272L10.6229 12.0371L3.32856 19.3314C2.93803 19.722 2.93803 20.3551 3.32856 20.7457C3.71908 21.1362 4.35225 21.1362 4.74277 20.7457L12.0371 13.4513L19.3315 20.7457C19.722 21.1362 20.3552 21.1362 20.7457 20.7457C21.1362 20.3551 21.1362 19.722 20.7457 19.3315L13.4513 12.0371L20.7457 4.74272C21.1362 4.3522 21.1362 3.71903 20.7457 3.32851Z" fill="#c2c0b6"></path> </g></svg></button>
            </div>
            

            <div class="form-group">
                <label for="project-title">Title</label>
                <input id="project-title" name="project_title" type="text" maxlength="40" required>
            </div>

            <div class="form-group">
                <label for="project-description">Description</label>
                <textarea name="project_description" id="project-description" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label for="project-due-date">Due Date</label>
                <input id="project-due-date" name="project_due_date" type="date" required>
            </div>

            <div class="form-group">
                <label for="project-priority">Priority</label>
                <select name="project_priority" id="project-priority" required>
                    <option value="" selected disabled>Select</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <button id="new-project-dialog-submit-button" class="dialog-submit-button" type="submit">Add Project</button>

        </form>
    </dialog>

</body>
</html>
